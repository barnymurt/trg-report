<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intellectus Discovery — Share-Ready Reports</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0f0f1a',
            surface: '#1a1a2e',
            surface2: '#16162a',
            border: 'rgba(255,255,255,0.08)',
            accent: '#3b82f6',
            accentHover: '#2563eb',
            success: '#22c55e',
            warning: '#f59e0b',
            danger: '#ef4444',
            muted: '#64748b',
            textPrimary: '#ffffff',
            textSecondary: '#94a3b8',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0f0f1a; }
    .modal-overlay {
      animation: fadeIn 0.2s ease-out;
    }
    .modal-content {
      animation: slideUp 0.3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      animation: spin 0.8s linear infinite;
    }
    .watermark-confidential {
      background: repeating-linear-gradient(
        135deg,
        transparent,
        transparent 40px,
        rgba(239,68,68,0.06) 40px,
        rgba(239,68,68,0.06) 80px
      );
    }
    .watermark-restricted {
      border: 2px solid rgba(245,158,11,0.4);
    }
    .classification-badge::before {
      content: '';
      display: block;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        135deg,
        transparent,
        transparent 10px,
        rgba(239,68,68,0.05) 10px,
        rgba(239,68,68,0.05) 20px
      );
      pointer-events: none;
    }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #1a1a2e; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 2px; }
  </style>
</head>
<body class="text-white font-sans antialiased">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── SAMPLE DATA ───────────────────────────────────────────────────────────
    const INVESTIGATION = {
      caseId: 'CASE-2026-0342',
      analyst: 'Senior Analyst M. Reyes',
      agency: 'National Criminal Investigation Bureau',
      agencyShort: 'NCIB',
      dateRange: '15 Jan 2026 — 28 Mar 2026',
      status: 'Active',
      findings: [
        { id: 1, type: 'entity',      name: 'Marcus Van Der Berg',    meta: 'NCIB-0942', source: 'Compass',   value: 'Confidence: 94%',   flag: null },
        { id: 2, type: 'entity',      name: 'Pacific Holdings LLC',   meta: 'GRA-3311',  source: 'Gravity',    value: 'Confidence: 87%',   flag: null },
        { id: 3, type: 'org',         name: 'Three Countries Network', meta: 'QUA-0078',  source: 'Quadrant',   value: 'Confidence: 78%',   flag: null },
        { id: 4, type: 'connection',  name: 'Marcus Van Der Berg',    meta: '→ Pacific Holdings LLC', source: 'Pulse', value: 'Strength: HIGH', flag: null },
        { id: 5, type: 'location',    name: 'Hamburg Warehouse District', meta: 'DIS-2291', source: 'Discovery', value: 'Relevance: HIGH', flag: null },
        { id: 6, type: 'transaction', name: '14 transfers · €2,340,000', meta: null,      source: 'Gravity',   value: '€2,340,000 · RED', flag: 'RED' },
        { id: 7, type: 'device',      name: 'IMEI 4XXXXX8472',        meta: null,        source: 'Compass',   value: 'Last: 22 Mar 2026', flag: null },
        { id: 8, type: 'travel',      name: '12 cross-border movements', meta: null,       source: 'Discovery', value: 'Pattern: REGULAR', flag: null },
      ],
      dataSources: ['Compass', 'Gravity', 'Quadrant', 'Pulse', 'Discovery'],
    };

    const AI_NARRATIVE = `Analysis of device location data, financial transaction records, and organizational linkage records for the period 15 January – 28 March 2026 establishes a consistent pattern of activity linking subject Marcus Van Der Berg to Pacific Holdings LLC, a registered shell entity domiciled in the Hamburg Warehouse District. Cross-referencing Compass telco data with Gravity financial feeds reveals 14 direct financial transitions totaling approximately €2.34M over the analysis window, with funds consistently routing through the Hamburg entity before disbursement to accounts in three separate jurisdictions. Device IMEI 4XXXXX8472, associated with the subject, was detected at the Hamburg Warehouse District on 7 occasions during the analysis period.

The Three Countries Network is assessed with HIGH confidence as the coordinating organisational structure for the financial flows identified. Cross-border travel analysis via Discovery confirms 12 discrete movements by the subject between Hamburg, Rotterdam, and a third jurisdiction consistent with the network's operational footprint.

Subject Reyes recommends further investigation under directive 7-Alpha and requests authorisation to escalate financial surveillance to Gravity Level 2 access.`;

    const TEMPLATES = [
      { id: 'agency-standard', label: 'Agency Standard', desc: 'Standard intelligence report format with agency branding, entity tables, and structured narrative.', status: 'active' },
      { id: 'executive-brief', label: 'Executive Brief', desc: 'Condensed summary for senior stakeholders. 2-page maximum, key findings only.', status: 'locked', available: 'Q3 2026' },
      { id: 'secure-classified', label: 'Secure Classified', desc: 'Full evidentiary package with chain-of-custody audit trail and classification markings.', status: 'locked', available: 'Q3 2026' },
    ];

    const CLASSIFICATIONS = [
      { id: 'confidential', label: 'Confidential', color: '#ef4444', watermark: true },
      { id: 'restricted',   label: 'Restricted',   color: '#f59e0b', watermark: false },
      { id: 'internal',     label: 'Internal',    color: '#64748b', watermark: false },
    ];

    // ─── TOP NAV ───────────────────────────────────────────────────────────────
    function TopNav() {
      return (
        <nav className="h-14 bg-surface border-b border-border flex items-center justify-between px-6">
          <div className="flex items-center gap-4">
            <div className="flex items-center gap-2">
              <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
                <rect width="40" height="40" rx="6" fill="#3b82f6" fillOpacity="0.15"/>
                <path d="M12 28L20 12L28 28H12Z" fill="#3b82f6" fillOpacity="0.6"/>
                <path d="M16 28L20 18L24 28H16Z" fill="#3b82f6"/>
              </svg>
              <span className="text-sm font-semibold tracking-wide text-white">TRG</span>
            </div>
            <div className="w-px h-6 bg-border" />
            <div className="flex items-center gap-1 text-sm text-muted">
              <span>Intellectus</span>
              <svg className="w-3 h-3 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
              <span className="text-white font-medium">Discovery</span>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <div className="text-right">
              <p className="text-xs text-muted">Signed in</p>
              <p className="text-sm font-medium text-white">Senior Analyst M. Reyes</p>
            </div>
            <div className="w-8 h-8 rounded-full bg-accent flex items-center justify-center text-sm font-semibold">
              MR
            </div>
          </div>
        </nav>
      );
    }

    // ─── SIDEBAR ───────────────────────────────────────────────────────────────
    const SIDEBAR_ITEMS = [
      { icon: '🗺️', label: 'Map', active: false },
      { icon: '📊', label: 'Timeline', active: false },
      { icon: '🔍', label: 'Findings', active: true },
      { icon: '📄', label: 'Reports', active: false },
    ];

    function Sidebar() {
      return (
        <aside className="w-56 bg-surface border-r border-border flex flex-col">
          <div className="p-4">
            <p className="text-xs uppercase tracking-wider text-muted mb-3">Modules</p>
            <nav className="space-y-1">
              {SIDEBAR_ITEMS.map(item => (
                <button
                  key={item.label}
                  className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors ${
                    item.active
                      ? 'bg-accent/15 text-accent border border-accent/30'
                      : 'text-textSecondary hover:bg-white/5 hover:text-white'
                  }`}
                >
                  <span>{item.icon}</span>
                  <span>{item.label}</span>
                  {item.active && (
                    <span className="ml-auto w-1.5 h-1.5 rounded-full bg-accent" />
                  )}
                </button>
              ))}
            </nav>
          </div>
          <div className="mt-auto p-4 border-t border-border">
            <div className="bg-surface2 rounded-lg p-3">
              <p className="text-xs text-muted mb-1">Data Sources</p>
              <div className="flex flex-wrap gap-1">
                {INVESTIGATION.dataSources.map(ds => (
                  <span key={ds} className="text-xs px-2 py-0.5 rounded bg-white/5 text-muted">{ds}</span>
                ))}
              </div>
            </div>
          </div>
        </aside>
      );
    }

    // ─── FINDING ROW ────────────────────────────────────────────────────────────
    const TYPE_CONFIG = {
      entity:      { label: 'Entity',      abbr: 'ENT',  color: null },
      org:         { label: 'Org Network',  abbr: 'NET',  color: null },
      connection:  { label: 'Connection',  abbr: 'LNK',  color: null },
      location:    { label: 'Location',     abbr: 'LOC',  color: null },
      transaction: { label: 'Transaction',  abbr: 'TXN',  color: '#ef4444' },
      device:      { label: 'Device',       abbr: 'DEV',  color: null },
      travel:      { label: 'Travel',       abbr: 'TRV',  color: null },
    };

    function FindingRow({ finding, onSelect, isSelected }) {
      const config = TYPE_CONFIG[finding.type];
      const hasFlag = finding.flag === 'RED';

      return (
        <div
          onClick={onSelect}
          className={`px-4 py-3 border-b border-border last:border-b-0 cursor-pointer transition-all hover:bg-white/[0.03] ${
            isSelected ? 'bg-accent/10 border-l-2 border-l-accent' : ''
          } ${hasFlag ? 'border-l-2 border-l-danger' : ''}`}
        >
          <div className="flex items-start justify-between gap-3">
            <div className="flex items-start gap-3 flex-1 min-w-0">
              <div className={`flex-shrink-0 mt-0.5 px-1.5 py-0.5 rounded text-[10px] font-semibold tracking-wide uppercase ${
                config.color
                  ? 'bg-danger/20 text-danger'
                  : 'bg-white/10 text-textSecondary'
              }`}>
                {config.abbr}
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <p className="text-sm font-medium text-white truncate">{finding.name}</p>
                  {finding.meta && (
                    <span className="text-xs text-muted">{finding.meta}</span>
                  )}
                  {hasFlag && (
                    <span className="flex items-center gap-1 text-xs text-danger font-medium">
                      <span className="w-1.5 h-1.5 rounded-full bg-danger" />
                      FLAG
                    </span>
                  )}
                </div>
                <p className="text-xs text-muted mt-0.5">
                  {finding.source}
                  <span className="mx-1.5 text-white/20">·</span>
                  {finding.value}
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── FINDINGS PANEL ────────────────────────────────────────────────────────
    function FindingsPanel({ onExport }) {
      return (
        <div className="flex flex-col h-full">
          <div className="flex items-center justify-between px-4 py-3 border-b border-border">
            <div>
              <h3 className="text-sm font-semibold text-white">Findings</h3>
              <p className="text-xs text-muted mt-0.5">{INVESTIGATION.findings.length} items across {INVESTIGATION.dataSources.length} sources</p>
            </div>
            <button
              onClick={onExport}
              className="flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-medium bg-white/5 hover:bg-white/10 text-textSecondary hover:text-white border border-border transition-all"
            >
              <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
              </svg>
              Export CSV
            </button>
          </div>
          <div className="flex-1 overflow-y-auto scrollbar-thin">
            {INVESTIGATION.findings.map(finding => (
              <FindingRow key={finding.id} finding={finding} />
            ))}
          </div>
        </div>
      );
    }

    // ─── MAP PLACEHOLDER ───────────────────────────────────────────────────────
    function MapPlaceholder() {
      return (
        <div className="relative flex-1 min-h-[260px] bg-surface rounded-xl border border-border overflow-hidden">
          {/* Simulated map tiles */}
          <div className="absolute inset-0 opacity-30">
            {[...Array(6)].map((_, row) => (
              [...Array(8)].map((__, col) => (
                <div
                  key={`${row}-${col}`}
                  className="absolute border-[0.5px] border-white/10"
                  style={{
                    top: `${row * 16.67}%`,
                    left: `${col * 12.5}%`,
                    width: '12.5%',
                    height: '16.67%',
                  }}
                />
              ))
            ))}
          </div>

          {/* Map glow */}
          <div className="absolute inset-0 bg-gradient-to-br from-accent/5 via-transparent to-accent/10" />

          {/* Markers */}
          <div className="absolute top-[35%] left-[45%] flex flex-col items-center">
            <div className="w-3 h-3 rounded-full bg-danger border-2 border-white/30 shadow-[0_0_8px_rgba(239,68,68,0.6)]" />
            <div className="mt-1 text-[10px] text-danger font-medium">Subject</div>
          </div>
          <div className="absolute top-[55%] left-[60%] flex flex-col items-center">
            <div className="w-2.5 h-2.5 rounded-full bg-warning border border-white/20" />
            <div className="mt-1 text-[10px] text-warning">Entity</div>
          </div>
          <div className="absolute top-[42%] left-[65%] flex flex-col items-center">
            <div className="w-2 h-2 rounded-full bg-accent border border-white/20" />
          </div>
          <div className="absolute top-[28%] left-[35%] flex flex-col items-center">
            <div className="w-2 h-2 rounded-full bg-success border border-white/20" />
            <div className="mt-1 text-[10px] text-success">HQ</div>
          </div>

          {/* Hamburg label */}
          <div className="absolute bottom-3 right-3 bg-surface/90 backdrop-blur rounded px-2 py-1 text-xs text-muted border border-border">
            Hamburg Investigation Zone · 53.5°N 10.0°E
          </div>

          {/* Map controls */}
          <div className="absolute top-3 right-3 flex flex-col gap-1">
            <button className="w-7 h-7 rounded bg-surface/90 backdrop-blur border border-border flex items-center justify-center text-muted hover:text-white text-sm">+</button>
            <button className="w-7 h-7 rounded bg-surface/90 backdrop-blur border border-border flex items-center justify-center text-muted hover:text-white text-sm">−</button>
          </div>
        </div>
      );
    }

    // ─── CASE HEADER ───────────────────────────────────────────────────────────
    function CaseHeader() {
      return (
        <div className="flex items-center justify-between px-6 py-4 border-b border-border bg-surface/50">
          <div className="flex items-center gap-4">
            <div className="flex items-center gap-2">
              <span className="text-xs font-mono font-semibold text-accent tracking-wide">
                {INVESTIGATION.caseId}
              </span>
              <span className="px-2 py-0.5 rounded text-[10px] font-semibold tracking-wider uppercase bg-success/15 text-success border border-success/30">
                {INVESTIGATION.status}
              </span>
            </div>
            <div className="flex items-center gap-3 text-xs text-muted">
              <span>{INVESTIGATION.analyst}</span>
              <span className="text-white/20">·</span>
              <span>{INVESTIGATION.dateRange}</span>
              <span className="text-white/20">·</span>
              <span>{INVESTIGATION.agency}</span>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button className="px-3 py-1.5 rounded-lg text-xs font-medium text-muted hover:text-white border border-border hover:border-white/20 transition-all">
              Share
            </button>
            <button className="px-3 py-1.5 rounded-lg text-xs font-medium text-muted hover:text-white border border-border hover:border-white/20 transition-all">
              Archive
            </button>
          </div>
        </div>
      );
    }

    // ─── REPORT PREVIEW ────────────────────────────────────────────────────────
    function ReportPreview({ template, classification, narrativeMode, showExportModal }) {
      const cls = CLASSIFICATIONS.find(c => c.id === classification);
      const isConfidential = classification === 'confidential';
      const isRestricted = classification === 'restricted';

      return (
        <div
          className={`relative bg-white rounded-xl overflow-hidden shadow-2xl transition-all duration-300 ${
            isConfidential ? 'watermark-confidential' : ''
          } ${isRestricted ? 'watermark-restricted' : ''}`}
        >
          {/* Classification badge top-right */}
          <div className="absolute top-3 right-3 z-10">
            <span
              className="px-2.5 py-1 rounded text-[10px] font-bold tracking-widest uppercase border"
              style={{ color: cls.color, borderColor: cls.color, backgroundColor: `${cls.color}15` }}
            >
              {cls.label.toUpperCase()}
            </span>
          </div>

          {/* Report Header */}
          <div className="bg-slate-800 px-6 py-5">
            <div className="flex items-start justify-between">
              <div>
                <div className="flex items-center gap-3 mb-3">
                  {/* Agency logo placeholder */}
                  <div className="w-10 h-10 rounded-lg bg-slate-700 border border-slate-600 flex items-center justify-center">
                    <span className="text-sm font-bold text-slate-300 tracking-tight">{INVESTIGATION.agencyShort}</span>
                  </div>
                  <div>
                    <p className="text-sm font-semibold text-white">{INVESTIGATION.agency}</p>
                    <p className="text-xs text-slate-400">Intelligence Report</p>
                  </div>
                </div>
                <h2 className="text-lg font-bold text-white leading-tight">
                  Investigation Report: {INVESTIGATION.caseId}
                </h2>
              </div>
              <div className="text-right">
                <p className="text-xs text-slate-400">Generated</p>
                <p className="text-sm font-medium text-slate-300">28 Mar 2026</p>
                <p className="text-xs text-slate-500 mt-0.5">Intellectus Discovery</p>
              </div>
            </div>
          </div>

          {/* Case Metadata */}
          <div className="px-6 py-4 border-b border-slate-200 bg-slate-50/50">
            <div className="grid grid-cols-4 gap-4">
              {[
                { label: 'Case ID', value: INVESTIGATION.caseId },
                { label: 'Analyst', value: INVESTIGATION.analyst },
                { label: 'Period', value: INVESTIGATION.dateRange },
                { label: 'Classification', value: cls.label },
              ].map(item => (
                <div key={item.label}>
                  <p className="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">{item.label}</p>
                  <p className="text-sm text-slate-800 font-medium mt-0.5">{item.value}</p>
                </div>
              ))}
            </div>
          </div>

          {/* Findings Table */}
          <div className="px-6 py-4">
            <h3 className="text-xs uppercase tracking-wider text-slate-500 font-semibold mb-3">Findings Summary</h3>
            <table className="w-full text-sm">
              <thead>
                <tr className="border-b border-slate-200">
                  <th className="text-left py-2 pr-3 text-[10px] uppercase tracking-wider text-slate-500 font-semibold w-16">Type</th>
                  <th className="text-left py-2 pr-3 text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Name / Description</th>
                  <th className="text-left py-2 pr-3 text-[10px] uppercase tracking-wider text-slate-500 font-semibold w-24">Source</th>
                  <th className="text-left py-2 text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Value</th>
                </tr>
              </thead>
              <tbody>
                {INVESTIGATION.findings.map(finding => {
                  const config = TYPE_CONFIG[finding.type];
                  const hasFlag = finding.flag === 'RED';
                  return (
                    <tr
                      key={finding.id}
                      className={`border-b border-slate-100 last:border-0 ${
                        hasFlag ? 'bg-red-50 border-l-2 border-l-danger' : ''
                      }`}
                    >
                      <td className="py-2.5 pr-3">
                        <span className={`inline-block px-1.5 py-0.5 rounded text-[10px] font-semibold tracking-wide ${
                          hasFlag
                            ? 'bg-red-100 text-red-700'
                            : 'bg-slate-100 text-slate-600'
                        }`}>
                          {config.abbr}
                        </span>
                      </td>
                      <td className="py-2.5 pr-3">
                        <span className="text-slate-800 font-medium">{finding.name}</span>
                        {finding.meta && (
                          <span className="ml-2 text-slate-400 text-xs">{finding.meta}</span>
                        )}
                      </td>
                      <td className="py-2.5 pr-3 text-slate-500 text-xs">{finding.source}</td>
                      <td className={`py-2.5 text-xs font-medium ${
                        hasFlag ? 'text-red-600' : finding.value.includes('HIGH') ? 'text-green-600' : 'text-slate-600'
                      }`}>
                        {finding.value}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Visualization Zone */}
          <div className="px-6 py-4 border-t border-slate-200">
            <h3 className="text-xs uppercase tracking-wider text-slate-500 font-semibold mb-3">Geographic Analysis</h3>
            <div className="bg-slate-100 rounded-lg border border-slate-200 h-32 flex items-center justify-center">
              <div className="text-center">
                <svg className="w-8 h-8 mx-auto text-slate-300 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                </svg>
                <p className="text-xs text-slate-400">Hamburg Investigation Zone · Geospatial Map</p>
                <p className="text-[10px] text-slate-300 mt-0.5">4 linked locations · 12 cross-border movements</p>
              </div>
            </div>
          </div>

          {/* Narrative Section */}
          <div className="px-6 py-4 border-t border-slate-200">
            <div className="flex items-center justify-between mb-3">
              <h3 className="text-xs uppercase tracking-wider text-slate-500 font-semibold">Analyst Narrative</h3>
              {narrativeMode === 'ai-assisted' && (
                <span className="flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-accent/10 border border-accent/30 text-[10px] font-semibold text-accent">
                  <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
                  </svg>
                  AI-assisted · Intellectus · 28 Mar 2026
                </span>

              <div className="flex-1 flex overflow-hidden">
                {/* Left: Map + Summary */}
                <div className="flex-1 flex flex-col p-6 gap-4 overflow-hidden">
                  <MapPlaceholder />
                </div>
                {/* Right: Findings Panel */}
                <div className="w-[420px] flex flex-col border-l border-border overflow-hidden">
                  <FindingsPanel onExport={() => setIsExportModalOpen(true)} />
                </div>
              </div>
            </main>
          </div>

          {/* Generate Report CTA */}
          <GenerateReportButton onClick={() => setIsReportModalOpen(true)} />

          {/* Modals */}
          <ReportBuilderModal
            isOpen={isReportModalOpen}
            onClose={() => setIsReportModalOpen(false)}
          />
          <ExportModal
            isOpen={isExportModalOpen}
            onClose={() => setIsExportModalOpen(false)}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
